name: Rajon
options:
  bundleIdPrefix: com.nickdegs
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Rajon:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.realvirtuality.blockings
        INFOPLIST_FILE: Sources/Info.plist
        DEVELOPMENT_TEAM: SZF4T3P583
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: $(BUILD_NUMBER)
        MARKETING_VERSION: 1.0.0
        CODE_SIGN_STYLE: Automatic
        ENABLE_BITCODE: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  Rajon:
    build:
      targets:
        Rajon: all
    run:
      config: Release
    archive:
      config: Release
